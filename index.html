<style>
/* CSS ORIGINAL PRESERVADO Y OPTIMIZADO */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sand: #F5F0E8; --sand-mid: #EDE5D5; --brown: #2E1F14; --gold: #C4A067;
  --gold-light: #E8D4A8; --white: #FDFCFA; --text: #2A1A0E; --text-muted: #7A6045;
  --border: rgba(46,31,20,0.1); --border-gold: rgba(196,160,103,0.35);
}
body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* NAVEGACIÓN */
nav { padding: 22px 48px; display: flex; align-items: center; justify-content: space-between; background: var(--brown); position: sticky; top: 0; z-index: 200; }
.nav-logo { font-weight: 300; font-size: 20px; color: var(--gold-light); }
.nav-cta { padding: 8px 20px; background: transparent; border: 0.5px solid rgba(196,160,103,0.4); border-radius: 100px; color: var(--gold-light); font-size: 12px; cursor: pointer; letter-spacing: 0.04em; }

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; }
.section-wrap { max-width: 760px; margin: 0 auto; padding: 60px 24px; }

/* HERO & CARD */
.hero { background: var(--brown); padding: 60px 24px 0; text-align: center; overflow: hidden; }
.hero h1 { font-family: 'Playfair Display', serif; font-size: 52px; color: var(--gold-light); line-height: 1.1; margin-bottom: 10px; }
.hero h1 em { font-style: italic; color: var(--gold); }
.membership-card { width: 360px; max-width: 90vw; background: linear-gradient(135deg, #2E1F14 0%, #4A2E1A 50%, #2E1F14 100%); border-radius: 20px; padding: 30px; margin: 0 auto -40px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); text-align: left; position: relative; z-index: 10; transform: translateY(20px); }

/* FORMS */
.steps-bar { display: flex; align-items: center; justify-content: center; margin-bottom: 40px; }
.step-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--sand-mid); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; }
.step-dot.active { background: var(--brown); color: var(--gold-light); }
.step-dot.done { background: var(--gold); color: var(--brown); }
.step-line { width: 40px; height: 0.5px; background: var(--border); }
.step-line.done { background: var(--gold); }

.form-block { background: var(--white); border: 0.5px solid var(--border); border-radius: 20px; padding: 35px; max-width: 550px; margin: 0 auto 15px; }
.field { margin-bottom: 18px; text-align: left; }
.field label { display: block; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
input, select, textarea { width: 100%; padding: 12px 15px; border: 0.5px solid var(--border); border-radius: 10px; background: var(--sand); font-family: inherit; font-size: 14px; outline: none; }

.chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
.chip { padding: 8px 16px; border: 0.5px solid var(--border); border-radius: 100px; font-size: 12px; cursor: pointer; background: var(--sand); transition: 0.2s; }
.chip.selected { background: var(--brown); color: var(--gold-light); border-color: var(--brown); }

.photo-upload { border: 1px dashed var(--border-gold); border-radius: 15px; padding: 30px; text-align: center; cursor: pointer; background: var(--gold-pale); }
#photo-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); margin: 0 auto 10px; display: none; }

.btn-primary { width: 100%; padding: 16px; background: var(--brown); color: var(--gold-light); border: none; border-radius: 100px; font-weight: 500; cursor: pointer; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
.btn-secondary { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--border); border-radius: 100px; font-size: 12px; color: var(--text-muted); margin-top: 10px; cursor: pointer; }

/* RESULT SCREEN */
.carnet-screen { background: var(--brown); min-height: 100vh; padding: 60px 24px; text-align: center; }
.big-card { background: linear-gradient(135deg, #2E1F14 0%, #4A2E1A 40%, #3A2416 100%); border-radius: 24px; padding: 40px; border: 0.5px solid rgba(196,160,103,0.25); max-width: 500px; margin: 0 auto 30px; text-align: left; }
.rec-card { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(196,160,103,0.15); border-radius: 20px; padding: 30px; max-width: 500px; margin: 0 auto; text-align: left; color: var(--gold-light); }
.btn-shop { background: var(--gold); color: var(--brown); font-weight: 700; margin-top: 25px; }
</style>
</head>
