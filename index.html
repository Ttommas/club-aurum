/* ============================================================
   AURUM CLUB - HUMAN CRAFT (DESIGN SYSTEM ORIGINAL)
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sand: #F5F0E8; --sand-mid: #EDE5D5; --sand-dark: #D9CEBC;
  --brown: #2E1F14; --brown-mid: #5C3D2A; --brown-light: #8B6347;
  --gold: #C4A067; --gold-light: #E8D4A8; --gold-pale: #F5EDD8;
  --white: #FDFCFA; --text: #2A1A0E; --text-muted: #7A6045;
  --border: rgba(46,31,20,0.1); --border-gold: rgba(196,160,103,0.35);
}

html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* NAVEGACIÓN */
nav { padding: 22px 48px; display: flex; align-items: center; justify-content: space-between; background: var(--brown); position: sticky; top: 0; z-index: 200; }
.nav-logo { font-weight: 300; font-size: 20px; letter-spacing: -0.01em; color: var(--gold-light); }
.nav-logo strong { font-weight: 500; }
.nav-tag { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(196,160,103,0.6); }
.nav-cta { padding: 8px 20px; background: transparent; border: 0.5px solid rgba(196,160,103,0.4); border-radius: 100px; color: var(--gold-light); font-size: 12px; cursor: pointer; transition: 0.2s; letter-spacing: 0.04em; }

/* COMPONENTES DE UI */
.screen { display: none; }
.screen.active { display: block; }
.section-wrap { max-width: 760px; margin: 0 auto; padding: 80px 48px; }
.section-wrap.narrow { max-width: 600px; }

/* HERO */
.hero { background: var(--brown); padding: 80px 48px 0; text-align: center; position: relative; overflow: hidden; }
.hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(42px, 8vw, 62px); font-weight: 400; line-height: 1.1; color: var(--gold-light); margin-bottom: 10px; }
.hero h1 em { font-style: italic; color: var(--gold); }
.hero-sub { font-size: 15px; font-weight: 300; color: rgba(232,212,168,0.6); max-width: 420px; margin: 0 auto 48px; line-height: 1.7; }

/* PASOS Y FORMULARIO */
.steps-bar { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 48px; }
.step-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--sand-mid); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--text-muted); transition: 0.3s; }
.step-dot.active { background: var(--brown); color: var(--gold-light); border-color: var(--brown); }
.step-dot.done { background: var(--gold); color: var(--brown); border-color: var(--gold); }
.step-line { width: 48px; height: 0.5px; background: var(--border); }
.step-line.done { background: var(--gold); }

.form-block { background: var(--white); border: 0.5px solid var(--border); border-radius: 20px; padding: 40px; margin-bottom: 16px; }
.form-block h2 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; color: var(--brown); margin-bottom: 6px; }
.form-sub { font-size: 14px; color: var(--text-muted); font-weight: 300; margin-bottom: 28px; }

.field { margin-bottom: 20px; }
.field label { display: block; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
