<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        :root { --sand: #F5F0E8; --brown: #2E1F14; --gold: #C4A067; --gold-light: #E8D4A8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--brown); margin: 0; padding: 20px; display: flex; justify-content: center; -webkit-font-smoothing: antialiased; }
        #app { width: 100%; max-width: 450px; text-align: center; }
        .screen { display: none; opacity: 1; } /* Simplificado para evitar bloqueos */
        .active { display: block; }
        
        .card { 
            background: var(--brown); color: var(--gold-light); border-radius: 24px; 
            padding: 40px 30px; text-align: left; box-shadow: 0 20px 50px rgba(0,0,0,0.25); 
            margin: 30px 0; position: relative; overflow: hidden;
        }
        .btn { 
            width: 100%; padding: 20px; background: var(--brown); color: var(--gold-light); 
            border: none; border-radius: 100px; font-weight: 600; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 2px; font-size: 11px; transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        input, select, textarea { 
            width: 100%; padding: 16px; margin-bottom: 20px; border: 1px solid rgba(46,31,20,0.1); 
            border-radius: 12px; font-size: 16px; box-sizing: border-box; background: white; outline: none; font-family: inherit;
        }
        .label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; text-align: left; }
    </style>
</head>
<body>

<div id="app">
    <div id="s1" class="screen active">
        <h1 style="font-size: 42px; font-weight: 300; margin-bottom: 10px; letter-spacing: -2px;">club.aurum.</h1>
        <p style="opacity: 0.6; font-size: 15px; margin-bottom: 40px;">Tu membresía para descubrir tu potencial oculto.</p>
        <div class="card">
            <div style="font-size: 9px; letter-spacing: 4px; opacity: 0.4; margin-bottom: 30px;">MEMBER CARD</div>
            <div style="font-size: 24px; font-weight: 300;">Tu nombre aquí</div>
            <div style="margin-top:50px; display: flex; justify-content: space-between; font-family: monospace; font-size: 10px; opacity: 0.4;">
                <span>AURUM · 2026</span>
                <span style="letter-spacing: 1px;">SOLO LO ESENCIAL</span>
            </div>
        </div>
        <button class="btn" onclick="go(2)">Empezar Perfil</button>
    </div>

    <div id="s2" class="screen">
        <h2 style="font-weight: 400; margin-bottom: 30px;">Infraestructura Biológica</h2>
        <span class="label">Identidad</span>
        <input type="text" id="userName" placeholder="Nombre completo">
        <span class="label">Objetivo</span>
        <select id="userGoal">
            <option value="Potenciar mente y cuerpo">Rendimiento Integral</option>
            <option value="Descubrir potencial oculto">Desarrollo de Potencial</option>
            <option value="Estilo de vida saludable">Bienestar y Salud</option>
        </select>
        <span class="label">Actividad Física</span>
        <input type="text" id="userSport" placeholder="Ej: CrossFit, Running, Yoga">
        <button class="btn" onclick="finish()">Generar Rutina Aurum</button>
    </div>

    <div id="s3" class="screen">
        <h2 style="font-weight: 400; margin-bottom: 30px;">Tu Rutina Aurum</h2>
        <div id="finalCard"></div>
        <div style="background:white; padding:30px; border-radius:20px; text-align:left; border:1px solid rgba(0,0,0,0.03); margin-top:20px;">
            <div id="routine" style="font-size: 14px; line-height: 1.7; color: #4A3324;">Inspirando a descubrir lo esencial...</div>
        </div>
        <button class="btn" style="margin-top:30px; background:none; border:1px solid var(--brown); color:var(--brown);" onclick="location.reload()">Nuevo Perfil</button>
    </div>
</div>

<script>
    // Navegación Blindada para iFrame
    function go(n) {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });
        const next = document.getElementById('s' + n);
        if (next) {
            next.style.display = 'block';
            next.classList.add('active');
        }
    }

    const finish = () => {
        const name = document.getElementById('userName').value || 'Miembro';
        const goal = document.getElementById('userGoal').value;
        const sport = document.getElementById('userSport').value || 'Vida Activa';
        go(3);
        
        document.getElementById('finalCard').innerHTML = `
            <div class="card">
                <div style="font-size: 9px; letter-spacing: 4px; opacity: 0.4; margin-bottom: 20px;">OFFICIAL MEMBER</div>
                <div style="font-size: 26px; font-weight: 300; text-transform: lowercase;">${name}</div>
                <div style="margin-top:40px; display: flex; justify-content: space-between; font-family: monospace; font-size: 10px;">
                    <span style="opacity: 0.3;">ID: AUR-${Math.floor(Math.random()*9000+1000)}</span>
                    <span style="color:var(--gold)">SOLO LO ESENCIAL</span>
                </div>
            </div>
        `;

        setTimeout(() => {
            let recomendacion = "";
            if (goal.includes("Potenciar")) {
                recomendacion = `<strong>Estrategia de Rendimiento para ${name.split(' ')[0]}:</strong><br><br>
                • <strong>Creatine Monohydrate:</strong> Esencial para potenciar tu fuerza y descubrir tu potencial oculto[cite: 3, 17].<br>
                • <strong>Natural Protein Blend (Chocolate):</strong> Recuperación limpia preservando solo lo que tiene mayor impacto nutritivo[cite: 6, 9].<br>
                • <strong>Hydration Complex (Maracuyá):</strong> Mantené la pureza de tu hidratación con fórmulas que priorizan lo esencial[cite: 5, 26, 30].`;
            } else {
                recomendacion = `<strong>Estrategia de Bienestar para ${name.split(' ')[0]}:</strong><br><br>
                • <strong>Greens & Superfoods:</strong> Nutrición esencial para inspirarte a adoptar un estilo de vida más saludable[cite: 3, 20].<br>
                • <strong>Plant-based Protein (Vainilla):</strong> Proteína limpia y efectiva para quienes buscan simplicidad[cite: 5, 13].<br>
                • <strong>Hydration Complex:</strong> Hidratación inteligente para potenciar el cuerpo y la mente[cite: 3, 26].`;
            }
            document.getElementById('routine').innerHTML = recomendacion + "<br><br><em>Solo lo esencial para tu impacto nutritivo.</em>";
        }, 300);
    };
</script>
</body>
</html>
